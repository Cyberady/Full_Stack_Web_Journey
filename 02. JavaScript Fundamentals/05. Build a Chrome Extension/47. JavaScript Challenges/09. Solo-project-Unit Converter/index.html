<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="container">

        <!-- Top Section -->
        <div class="top">
            <h1 class="title">Metric/Imperial Unit Conversion</h1>

            <!-- INPUT -->
            <input 
                type="number" 
                id="input-value" 
                class="input-field" 
                placeholder="0"
            >

            <!-- BUTTON -->
            <button id="convert-btn" class="convert-btn">
                Convert
            </button>
        </div>

        <!-- Bottom Section -->
        <div class="bottom">

            <!-- LENGTH -->
            <div class="card">
                <h3>Length (Meter/Feet)</h3>
                <p id="length-result">
                    0 meters = 0 feet | 0 feet = 0 meters
                </p>
            </div>

            <!-- VOLUME -->
            <div class="card">
                <h3>Volume (Liters/Gallons)</h3>
                <p id="volume-result">
                    0 liters = 0 gallons | 0 gallons = 0 liters
                </p>
            </div>

            <!-- MASS -->
            <div class="card">
                <h3>Mass (Kilograms/Pounds)</h3>
                <p id="mass-result">
                    0 kilos = 0 pounds | 0 pounds = 0 kilos
                </p>
            </div>

        </div>

    </div>

    <script src="index.js"></script>

</body>
</html>
