<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scoreboard</title>
  <link rel="stylesheet" href="index.css">

  <!-- Digital font -->
  <link href="https://fonts.cdnfonts.com/css/digital-7-mono" rel="stylesheet">
</head>
<body>

  <div class="card">

    <!-- HOME -->
    <div class="team">
      <h2>HOME</h2>
      <div id="scorehome" class="score">0</div>
      <div class="buttons">
        <button onclick="increment1Home()">+1</button>
        <button onclick="increment2Home()">+2</button>
        <button onclick="increment3Home()">+3</button>
      </div>
    </div>

    <!-- GUEST -->
    <div class="team">
      <h2>GUEST</h2>
      <div id="scoreguest" class="score">0</div>
      <div class="buttons">
        <button onclick="increment1Guest()">+1</button>
        <button onclick="increment2Guest()">+2</button>
        <button onclick="increment3Guest()">+3</button>
      </div>
    </div>

  </div>

  <script src="index.js"></script>
</body>
</html>
